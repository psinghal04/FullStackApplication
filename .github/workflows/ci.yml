name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run backend build and tests
        working-directory: backend
        run: ./mvnw -B -ntp verify

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: |
            backend/target/surefire-reports/**
            backend/target/failsafe-reports/**
          if-no-files-found: warn

  frontend-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        shell: bash
        run: |
          set -o pipefail
          npm run test -- --code-coverage --watch=false --browsers=ChromeHeadlessNoSandbox --progress=false 2>&1 | tee test-output.log

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-artifacts
          path: |
            frontend/test-output.log
            frontend/coverage/**
            frontend/dist/**
          if-no-files-found: warn

  docker-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-tests, frontend-unit-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: local/hr-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: local/hr-frontend:ci

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push backend image (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hr-backend:${{ github.sha }}

      - name: Push frontend image (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hr-frontend:${{ github.sha }}

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [frontend-unit-tests]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Chrome
        id: setup-chrome-e2e
        uses: browser-actions/setup-chrome@v1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend app
        working-directory: frontend
        run: npm run start -- --host 127.0.0.1 --port 4200 > /tmp/frontend-e2e.log 2>&1 &

      - name: Wait for frontend
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4200 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          cat /tmp/frontend-e2e.log || true
          exit 1

      - name: Run Cypress E2E tests
        working-directory: frontend
        env:
          CHROME_BIN: ${{ steps.setup-chrome-e2e.outputs.chrome-path }}
        run: npm run cy:run -- --browser chrome

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            /tmp/frontend-e2e.log
            frontend/cypress/screenshots/**
            frontend/cypress/videos/**
          if-no-files-found: warn
